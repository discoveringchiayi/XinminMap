<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉大新民校區地圖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #6cb125;
            overflow: hidden;
            font-family: sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #map-container {
            position: absolute;
            transform-origin: 0 0;
        }

        #map-image {
            display: block;
            cursor: grab;
        }

            #map-image:active {
                cursor: grabbing;
            }

        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: white;
            border: 8px solid var(--theme-color, #00e5ff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333;
            font-size: 40px;
            font-weight: 900;
        }

            .hotspot::after {
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background-color: var(--theme-color, #00e5ff);
                border-radius: 50%;
                opacity: 0.5;
                z-index: -1;
                animation: pulse 2s infinite ease-in-out;
            }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .hotspot::before {
            content: attr(data-name);
            position: absolute;
            bottom: 125px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(40, 40, 40, 0.95);
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 56px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .hotspot:hover::before {
            opacity: 1;
        }

        #coord-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: rgba(20, 20, 20, 0.9);
            color: #00e5ff;
            padding: 15px 25px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 200;
            border: 2px solid #00e5ff;
            pointer-events: none;
        }

        #legend-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(40, 40, 40, 0.85);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }

            #legend-panel h3 {
                margin: 0 0 15px 0;
                font-size: 24px;
                border-bottom: 2px solid #00e5ff;
                padding-bottom: 10px;
                text-align: center;
                letter-spacing: 2px;
            }

            #legend-panel ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }

            #legend-panel li {
                font-size: 18px;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                cursor: pointer;
                transition: color 0.2s ease, transform 0.1s ease;
            }

                #legend-panel li:hover {
                    color: #00e5ff;
                    transform: translateX(5px);
                }

            #legend-panel .leg-num {
                display: inline-block;
                background-color: #00e5ff;
                color: #333;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                text-align: center;
                line-height: 30px;
                font-weight: bold;
                margin-right: 12px;
                font-size: 16px;
                flex-shrink: 0;
                transition: none;
            }
    </style>
</head>
<body>

    <div id="coord-panel">📍 點擊地圖獲取座標<br>X: -- %<br>Y: -- %</div>

    <div id="legend-panel">
        <h3>📍 校園圖例</h3>
        <ul id="legend-list"></ul>
    </div>

    <div id="viewport">
        <div id="map-container">
            <img id="map-image" src="Xinmin Map.png" alt="校區地圖" draggable="false">
        </div>
    </div>

    <script>
        // ==========================================
        // 🌟 你的標註點區塊 (大門口跟管院A棟已恢復)
        // ==========================================
        const locations = [
            // 💡 記得去 A+B 的 data.js 找 ID，並用 # 取代 ?p=
            { num: "1", id: 101, name: "大門口", x: 49.5, y: 73.7, color: "#00e5ff", link: "./A+B/index.html" },
            { num: "2", id: 102, name: "管理學院A棟", x: 48.9, y: 57.2, color: "#00e5ff", link: "./A+B/index.html#B-18" },
            { num: "3", id: 103, name: "新民預留點-3", x: 45.0, y: 55.0, color: "#00e5ff", link: "#" },
            { num: "4", id: 104, name: "新民預留點-4", x: 55.0, y: 65.0, color: "#00e5ff", link: "#" },
            { num: "5", id: 105, name: "新民預留點-5", x: 65.0, y: 35.0, color: "#00e5ff", link: "#" },
            { num: "6", id: 106, name: "新民預留點-6", x: 75.0, y: 45.0, color: "#00e5ff", link: "#" },
            { num: "7", id: 107, name: "新民預留點-7", x: 85.0, y: 55.0, color: "#00e5ff", link: "#" },
            { num: "8", id: 108, name: "新民預留點-8", x: 35.0, y: 35.0, color: "#00e5ff", link: "#" },
            { num: "9", id: 109, name: "新民預留點-9", x: 25.0, y: 45.0, color: "#00e5ff", link: "#" }
        ];

        const container = document.getElementById('map-container');
        const mapImage = document.getElementById('map-image');
        const viewport = document.getElementById('viewport');
        const legendList = document.getElementById('legend-list');
        const coordPanel = document.getElementById('coord-panel');

        locations.forEach(loc => {
            if (loc.num) {
                const li = document.createElement('li');
                li.innerHTML = `<span class="leg-num" style="background-color: ${loc.color};">${loc.num}</span> <span class="leg-text">${loc.name}</span>`;
                li.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (loc.link && loc.link !== "#") window.open(loc.link, '_blank');
                });
                legendList.appendChild(li);
            }

            const dot = document.createElement('div');
            dot.className = 'hotspot';
            dot.style.left = loc.x + '%';
            dot.style.top = loc.y + '%';
            dot.style.setProperty('--theme-color', loc.color);
            dot.setAttribute('data-name', loc.name);

            if (loc.num) {
                dot.textContent = loc.num;
            }

            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                if (loc.link && loc.link !== "#") window.open(loc.link, '_blank');
            });
            container.appendChild(dot);
        });

        let currentScale = 1;
        let baseScale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let hasMoved = false;

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function initMapView() {
            if (!mapImage.naturalWidth) return;
            const ratioX = window.innerWidth / mapImage.naturalWidth;
            const ratioY = window.innerHeight / mapImage.naturalHeight;

            baseScale = Math.min(ratioX, ratioY) * 0.9;
            currentScale = baseScale;

            translateX = (window.innerWidth - (mapImage.naturalWidth * currentScale)) / 2;
            translateY = (window.innerHeight - (mapImage.naturalHeight * currentScale)) / 2;
            updateTransform();
        }

        mapImage.onload = initMapView;
        if (mapImage.complete) initMapView();
        window.addEventListener('resize', initMapView);

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1;
            const delta = e.deltaY > 0 ? -zoomIntensity : zoomIntensity;

            const mouseX = e.clientX - translateX;
            const mouseY = e.clientY - translateY;

            const newScale = Math.min(Math.max(baseScale, currentScale + delta), 4);

            translateX -= mouseX * (newScale / currentScale - 1);
            translateY -= mouseY * (newScale / currentScale - 1);

            currentScale = newScale;
            updateTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.hotspot') || e.target.closest('#legend-panel')) return;
            isDragging = true;
            hasMoved = false;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            hasMoved = true;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', (e) => {
            if (isDragging && !hasMoved) {
                const rect = mapImage.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                const pctX = ((clickX / rect.width) * 100).toFixed(1);
                const pctY = ((clickY / rect.height) * 100).toFixed(1);

                if (pctX >= 0 && pctX <= 100 && pctY >= 0 && pctY <= 100) {
                    coordPanel.innerHTML = `🎯 當前觀測座標：<br>X: ${pctX}<br>Y: ${pctY}`;
                }
            }
            isDragging = false;
        });

        window.addEventListener('mouseleave', () => { isDragging = false; });

    </script>
</body>
</html>
