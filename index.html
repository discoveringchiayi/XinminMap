<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉大新民校區地圖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #6cb125;
            overflow: hidden;
            font-family: sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #map-container {
            position: absolute;
            transform-origin: 0 0;
        }

        #map-image {
            display: block;
            cursor: grab;
        }

        #map-image:active {
            cursor: grabbing;
        }

        /* ==========================================
           📍 標註點樣式 (圓圈微調放大)
           ========================================== */
        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 160px;   
            height: 160px;  
            background-color: white;
            border: 12px solid var(--theme-color, #00e5ff); 
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333;
            font-size: 100px; 
            font-weight: 900;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        /* 防遮擋機制 */
        .hotspot:hover {
            z-index: 1000; 
            transform: translate(-50%, -50%) scale(1.15);
        }

        .hotspot::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: var(--theme-color, #00e5ff);
            border-radius: 50%;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* ==========================================
           🌟 標註點 hover 跳出來的文字卡片 (字體明顯放大)
           ========================================== */
        .hotspot::before {
            content: attr(data-name);
            position: absolute;
            bottom: 180px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(40, 40, 40, 0.95);
            color: #ffffff;
            padding: 25px 50px; 
            border-radius: 30px; 
            font-size: 90px; 
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        .hotspot:hover::before {
            opacity: 1;
        }

        /* ==========================================
           🌟 圖例面板的專屬設計
           ========================================== */
        #legend-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(40, 40, 40, 0.85);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }

        #legend-panel h3 {
            margin: 0 0 15px 0;
            font-size: 24px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        #legend-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #legend-panel li {
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        #legend-panel li a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        #legend-panel li a:hover {
            color: #00e5ff;
            transform: translateX(5px);
        }

        #legend-panel .leg-num {
            display: inline-block;
            background-color: #00e5ff;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 12px;
            font-size: 16px;
            flex-shrink: 0;
            transition: none;
        }
    </style>
</head>
<body>

    <div id="legend-panel">
        <h3>📍 校園圖例</h3>
        <ul id="legend-list"></ul>
    </div>

    <div id="viewport">
        <div id="map-container">
            <img id="map-image" src="Xinmin Map.png" alt="校區地圖" draggable="false">
        </div>
    </div>

    <script>
        const locations = [
            { num: "1", id: 101, name: "大門口", x: 49.5, y: 73.7, color: "#00e5ff", link: "./A+B/index.html" },
            { num: "2", id: 102, name: "管理學院A棟", x: 48.9, y: 57.2, color: "#00e5ff", link: "./A+B/index.html#22-b-18" }, 
            { num: "3", id: 103, name: "學員餐廳", x: 36.4, y: 57.4, color: "#00e5ff", link: "./A+B/index.html#8-b-3" },
            { num: "4", id: 104, name: "管理學院B棟", x: 32.7, y: 54.1, color: "#00e5ff", link: "./A+B/index.html#9-b-4" },
            { num: "5", id: 105, name: "明德樓", x: 47.9, y: 28.4, color: "#00e5ff", link: "./A+B/index.html#26-b-25" },
            { num: "6", id: 106, name: "獸醫館", x: 87.2, y: 60.0, color: "#00e5ff", link: "./C、D、E路/index.html#4-c-5" },
            { num: "7", id: 107, name: "游泳池", x: 81.2, y: 42.2, color: "#00e5ff", link: "./C、D、E路/index.html#12-e-4" },
        ];

        const container = document.getElementById('map-container');
        const mapImage = document.getElementById('map-image');
        const viewport = document.getElementById('viewport');
        const legendList = document.getElementById('legend-list');

        locations.forEach(loc => {
            if (loc.num) {
                const li = document.createElement('li');
                const isLinkValid = loc.link && loc.link !== "#";
                li.innerHTML = `
                    <a href="${isLinkValid ? loc.link : 'javascript:void(0);'}" target="${isLinkValid ? '_blank' : '_self'}">
                        <span class="leg-num" style="background-color: ${loc.color};">${loc.num}</span>
                        <span class="leg-text">${loc.name}</span>
                    </a>`;
                legendList.appendChild(li);
            }

            const dot = document.createElement('a');
            dot.className = 'hotspot';
            dot.style.left = loc.x + '%';
            dot.style.top = loc.y + '%';
            dot.style.setProperty('--theme-color', loc.color);
            dot.setAttribute('data-name', loc.name);

            if (loc.num) {
                dot.textContent = loc.num;
            }

            if (loc.link && loc.link !== "#") {
                dot.href = loc.link;
                dot.target = "_blank"; 
            } else {
                dot.href = "javascript:void(0);";
            }

            dot.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            container.appendChild(dot);
        });

        let currentScale = 1;
        let baseScale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let hasMoved = false;

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function initMapView() {
            if (!mapImage.naturalWidth) return;
            const ratioX = window.innerWidth / mapImage.naturalWidth;
            const ratioY = window.innerHeight / mapImage.naturalHeight;

            baseScale = Math.min(ratioX, ratioY) * 0.9; 
            currentScale = baseScale;

            translateX = (window.innerWidth - (mapImage.naturalWidth * currentScale)) / 2;
            translateY = (window.innerHeight - (mapImage.naturalHeight * currentScale)) / 2;
            updateTransform();
        }

        mapImage.onload = initMapView;
        if (mapImage.complete) initMapView();
        window.addEventListener('resize', initMapView);

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1;
            const delta = e.deltaY > 0 ? -zoomIntensity : zoomIntensity;

            const mouseX = e.clientX - translateX;
            const mouseY = e.clientY - translateY;

            const newScale = Math.min(Math.max(baseScale, currentScale + delta), 4);

            translateX -= mouseX * (newScale / currentScale - 1);
            translateY -= mouseY * (newScale / currentScale - 1);

            currentScale = newScale;
            updateTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.hotspot') || e.target.closest('#legend-panel')) return;
            isDragging = true;
            hasMoved = false;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            hasMoved = true;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

    </script>
</body>
</html>
